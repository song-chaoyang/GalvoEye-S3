; ============================================================
; GalvoEye-S3 激光振镜投影仪固件 - PlatformIO 配置
; 基于 bbLaser 项目衍生 (CC-BY-NC-SA 3.0)
; 目标平台: ESP32-S3-CAM
; ============================================================

[env:esp32-s3-devkitc-1]
; --- 平台与框架 ---
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- 分区方案: huge_app (单大应用分区，适合复杂固件) ---
board_build.partitions = huge_app.csv

; --- 上传与监视 ---
monitor_speed = 115200
upload_speed = 921600

; --- 编译选项 ---
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    ; 启用 PSRAM (ESP32-S3-CAM 板载)
    -DCONFIG_SPIRAM_MODE_OCT
    ; 优化等级
    -O2

; --- 库依赖 ---
lib_deps =
    ; WiFi (Arduino 内置，无需额外安装)
    ; WebSockets 服务器
    links2004/WebSockets@^2.4.1
    ; SPI (Arduino 内置)
    ; SD 卡
    ; FS 文件系统 (Arduino 内置)
    ; VL53L1X ToF 传感器
    pololu/VL53L1X@^1.3.1
    ; ESP32Servo (用于振镜 PWM 备选方案)
    madhephaestus/ESP32Servo@^3.0.1

; --- 额外源文件监视 ---
src_filter =
    +<*>

; --- 调试选项 ---
; debug_tool = esp-prog
; debug_init_break = tbreak setup
