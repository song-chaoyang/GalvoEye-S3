; ============================================================
; GalvoEye-S3 激光振镜投影仪固件 - PlatformIO 配置
; 基于 bbLaser 项目衍生 (CC-BY-NC-SA 3.0)
; 目标平台: ESP32-S3-CAM
; ============================================================

[env:esp32-s3-devkitc-1]
; --- 平台与框架 ---
; 注意: PlatformIO 可能没有精确的 ESP32-S3-CAM 板定义，
; 使用 esp32-s3-devkitc-1 作为最接近的替代。
; 如果编译出现 PSRAM 相关错误，可以尝试:
;   1. 手动添加 board 定义（参考 ESP32-S3-CAM 的 board.json）
;   2. 或者使用 board_build.arduino.memory_type = qio_opi
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; --- 分区方案: huge_app (单大应用分区，适合复杂固件) ---
board_build.partitions = huge_app.csv

; --- 上传与监视 ---
monitor_speed = 115200
upload_speed = 921600

; --- 编译选项 ---
; 注意: espressif32@6.5.0 对应 Arduino Core 2.x，
; ledcSetup()/ledcAttachPin()/ledcWrite(channel, duty) 等 API 可正常使用。
; 如果升级到 Arduino Core 3.x（espressif32@7.x+），
; 需要将旧 API 替换为新 API:
;   ledcSetup(ch, freq, res) + ledcAttachPin(pin, ch) -> ledcAttach(pin, freq, res)
;   ledcWrite(ch, duty) -> ledcWrite(pin, duty)
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    ; 启用 PSRAM (ESP32-S3-CAM 板载 8MB PSRAM)
    -DCONFIG_SPIRAM_MODE_OCT
    ; 优化等级
    -O2

; --- 库依赖 ---
lib_deps =
    ; WiFi (Arduino 内置，无需额外安装)
    ; WebSockets 服务器
    links2004/WebSockets@^2.4.1
    ; SPI (Arduino 内置)
    ; SD 卡
    ; FS 文件系统 (Arduino 内置)
    ; VL53L1X ToF 传感器
    pololu/VL53L1X@^1.3.1

; --- 额外源文件监视 ---
src_filter =
    +<*>

; --- 调试选项 ---
; debug_tool = esp-prog
; debug_init_break = tbreak setup
